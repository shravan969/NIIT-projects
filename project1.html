<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopEase | Online Store</title>

    <nav>
    <a href="#home">Home</a>
    <a href="#products">Shop</a>
    <a href="#profile">Profile</a>
    <a href="#contact">Contact</a>
</nav>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        /* Header */
    
        header {
            background-color: #3d24c7;
            color: white;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 24px;
        }

        .search-box input {
            padding: 7px;
            width: 200px;
            border: none;
            border-radius: 4px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 16px;
        }

        /* Banner */
        .banner {
            background-color: #4CAF50;
            color: white;
            padding: 50px;
            text-align: center;
        }

        /* Products */
        .products {
            padding: 40px;
        }

        .products h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .product {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .product p {
            color: green;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product button {
            padding: 10px 15px;
            background-color: #ff6600;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Profile Page */
        .profile {
            background-color: white;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 6px;
        }

        .profile h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        .profile input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
        .product {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}
.product img {
    transition: transform 0.3s ease;
}

.product:hover img {
    transform: scale(1.05);
}
.product button {
    transition: background-color 0.3s ease, transform 0.2s ease;
}

.product button:hover {
    background-color: #e65c00;
    transform: scale(1.05);
}
nav a {
    position: relative;
    padding-bottom: 4px;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0;
    height: 2px;
    background-color: #4CAF50;
    left: 0;
    bottom: 0;
    transition: width 0.3s;
}

nav a:hover::after {
    width: 100%;
}
.search-box input {
    transition: box-shadow 0.3s ease;
}

.search-box input:focus {
    outline: none;
    box-shadow: 0 0 8px rgba(76,175,80,0.7);
}
.profile {
    transition: box-shadow 0.3s ease;
}

.profile:hover {
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
}

    </style>
</head>

<body>

<header>
    <h1>ShopEase</h1>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#profile">Profile</a>
        <a href="#">Cart</a>
    </nav>
</header>

<section class="banner">
    <h2>Welcome to ShopEase</h2>
    <p>Your trusted online shopping platform</p>
</section>

<section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">
        <div class="product">
            <img src="https://via.placeholder.com/300">
            <h3>Smart Watch</h3>
            <p>₹2,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300">
            <h3>Headphones</h3>
            <p>₹1,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300">
            <h3>Shoes</h3>
            <p>₹3,499</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- Profile Page -->
<section class="profile" id="profile">
    <h2>User Profile</h2>

    <label>Name</label>
    <input type="text" value="John Doe">

    <label>Email</label>
    <input type="email" value="john@example.com">

    <label>Phone</label>
    <input type="text" value="+91 9876543210">

    <label>Address</label>
    <input type="text" value="India">

</section>

<footer>
    <p>© 2026 ShopEase. All Rights Reserved.</p>
</footer>

</body>
</html>
